services:
  kms-service:
    build: ./kms-service
    ports:
      - "4001:4001"
    environment:
      KMS_SERVICE_PORT: 4001
      KMS_SQLITE_PATH: /app/data/kms.sqlite
    volumes:
      - kms-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  wallet-service:
    build: ./wallet-service
    ports:
      - "4002:4002"
    environment:
      WALLET_SERVICE_PORT: 4002
      WALLET_SQLITE_PATH: /app/data/wallet.sqlite
    volumes:
      - wallet-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  vdr-service:
    build: ./vdr-service
    ports:
      - "4003:4003"
    environment:
      VDR_SERVICE_PORT: 4003
      VDR_SQLITE_PATH: /app/data/vdr.sqlite
      VDR_SERVICE_URL: http://vdr-service:4003
    volumes:
      - vdr-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  issuer-service:
    build:
      context: .
      dockerfile: issuer-service/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      SERVICE_HOST: issuer-service
      DIDCOMM_ENDPOINT: ws://issuer-service:3000
      DIDCOMM_PORT: 3000
      KMS_MODE: "external"
      EXTERNAL_KMS_URL: http://kms-service:4001
      WALLET_MODE: "external"
      EXTERNAL_WALLET_URL: http://wallet-service:4002
      VDR_SERVICE_URL: http://vdr-service:4003
    volumes:
      - issuer-kms-data:/app/data
    depends_on:
      wallet-service:
        condition: service_healthy
      vdr-service:
        condition: service_healthy
    restart: unless-stopped

  holder-service:
    build:
      context: .
      dockerfile: holder-service/Dockerfile
    ports:
      - "9005:9005"
    environment:
      PORT: 9005
      SERVICE_HOST: holder-service
      DIDCOMM_ENDPOINT: ws://holder-service:9005
      KMS_MODE: "internal"
      INTERNAL_KMS_SQLITE_PATH: /app/data/internal-kms.sqlite
      WALLET_MODE: "internal"
      INTERNAL_WALLET_SQLITE_PATH: /app/data/internal-wallet.sqlite
      VDR_SERVICE_URL: http://vdr-service:4003
    volumes:
      - holder-kms-data:/app/data
    depends_on:
      wallet-service:
        condition: service_healthy
      vdr-service:
        condition: service_healthy
    restart: unless-stopped

  verifier-service:
    build:
      context: .
      dockerfile: verifier-service/Dockerfile
    ports:
      - "9004:9004"
    environment:
      PORT: 9004
      DIDCOMM_PORT: 9004
      SERVICE_HOST: verifier-service
      DIDCOMM_ENDPOINT: ws://verifier-service:9004
      KMS_MODE: "external"
      EXTERNAL_KMS_URL: http://kms-service:4001
      WALLET_MODE: "external"
      EXTERNAL_WALLET_URL: http://wallet-service:4002
      VDR_SERVICE_URL: http://vdr-service:4003
    volumes:
      - verifier-kms-data:/app/data
    depends_on:
      wallet-service:
        condition: service_healthy
      vdr-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kms-data:
  wallet-data:
  vdr-data:
  issuer-kms-data:
  holder-kms-data:
  verifier-kms-data:
